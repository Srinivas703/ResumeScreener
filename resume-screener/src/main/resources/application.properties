spring.application.name=resume-screener

# ---------- Database ----------
spring.datasource.url=jdbc:mysql://localhost:3306/resume_screener_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- File upload ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------- JWT ----------
# 256-bit+ secret, replace in production and load from env var instead
app.jwt.secret=ReplaceThisWithALongRandomBase64EncodedSecretKeyForJwtSigning123456
app.jwt.expiration-ms=86400000

# ---------- AI Provider ----------
# Works with OpenAI-compatible endpoints (OpenAI, or any compatible gateway)
app.ai.api-url=https://api.openai.com/v1/chat/completions
app.ai.api-key=REPLACE_WITH_YOUR_API_KEY
app.ai.model=gpt-4o-mini

# ---------- Swagger ----------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.port=8080
